<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NAVIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: white;
            --text-color: #0f172a;
            --input-border: #e2e8f0;
            --petronas-cyan: #334155;
            --petronas-hover: #1e293b;
            --muted-text: #64748b;
        }
        [data-theme='dark'] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --input-border: #334155;
            --petronas-cyan: #0ea5e9;
            --petronas-hover: #38bdf8;
            --muted-text: #94a3b8;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: 0.3s; }
        .container { background: var(--card-bg); padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 340px; text-align: center; border-top: 4px solid var(--petronas-cyan); transition: 0.3s; }
        h2 { margin-bottom: 0.5rem; color: var(--text-color); font-weight: 700; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--input-border); border-radius: 6px; box-sizing: border-box; background-color: var(--bg-color); color: var(--text-color); transition: 0.3s; font-size: 15px; }
        input:focus { outline: none; border-color: var(--petronas-cyan); box-shadow: 0 0 0 3px rgba(0,210,190,0.15); }
        button { width: 100%; padding: 12px; background-color: var(--petronas-cyan); color: #ffffff; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.15); }
        button:hover { background-color: var(--petronas-hover); transform: translateY(-2px); }
        .alert { color: #842029; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <script>
        const savedTheme = localStorage.getItem('navis_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if(sessionStorage.getItem('navis_logged_in') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>

    <div class="container">
        <h2><i class="fas fa-ship" style="color: var(--petronas-cyan); margin-right: 8px;"></i> NAVIS</h2>
        <p style="font-size: 0.85em; color: var(--muted-text); margin-top: 0; margin-bottom: 20px;">Gestione Industriale — Portfolio Demo</p>

        <div class="alert" id="error-msg">Credenziali errate</div>

        <form id="login-form">
            <input type="text" id="username" placeholder="Nome Utente" required autofocus value="Dummy">
            <input type="password" id="password" placeholder="Password (qualsiasi)" required value="demo">
            <button type="submit"><i class="fas fa-sign-in-alt" style="margin-right:6px"></i>ACCEDI</button>
        </form>
        <p style="font-size: 0.75em; color: var(--muted-text); margin-top: 15px;">
            <i class="fas fa-info-circle"></i> Demo: credenziali pre-compilate, clicca "Accedi"
        </p>
    </div>

    <div style="position: absolute; bottom: 15px; width: 100%; text-align: center; color: #888; font-size: 13px;">
        &copy; Sviluppato da Emanuele Cazzola e Andrea Volpe - Riproduzione riservata
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user.trim() !== '' && pass.trim() !== '') {
                sessionStorage.setItem('navis_logged_in', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
